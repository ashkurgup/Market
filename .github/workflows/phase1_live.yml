name: Run Phase 1 Producer

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  phase1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -r requirements.txt
      - run: |
          python producer/phase1_producer.py
      - run: |
          git config user.name "market-bot"
          git config user.email "market-bot@users.noreply.github.com"
          git add snapshots/market_phase1.json
          git commit -m "Update snapshot" || echo "No changes"
          git push

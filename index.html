<!DOCTYPE html>
<html>
<head>
  <title>Market Dashboard — Phase 1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Market Dashboard — Phase 1</h1>
<div id="lastUpdated"></div>

<div class="grid">
  <div>
    <h2>NIFTY</h2>
    <div id="niftyValue"></div>

    <h3>Volatility (ATR)</h3>
    <div id="atrValue"></div>

    <h3>VWAP</h3>
    <div>Position: <span id="vwapPosition"></span></div>
    <div>Expansion Range: <span id="vwapRange"></span></div>
    <div>Midline: <span id="vwapMid"></span></div>
  </div>

  <div>
    <h3>Market Open</h3>
    <div id="gapStatus"></div>
    <div id="openingCandle"></div>

    <h3>Trend Architect</h3>
    <div id="trendBlock"></div>

    <h3>Previous Day Anchors</h3>
    <div id="anchorsValue"></div>

    <h3>Institutional Flows</h3>
    <div id="fiiDiiValue"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>

name: Update Phase‑2 Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (adjust later)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Phase‑2 producer
        run: |
          python producer/phase2_producer.py

      - name: Commit and push snapshot
        run: |
          git config user.name "market-bot"
          git config user.email "market-bot@users.noreply.github.com"
          git add snapshots/market_phase2.json
          git commit -m "Update market_phase2 snapshot" || echo "No changes to commit"
          git push

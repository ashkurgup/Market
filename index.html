<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NIFTY – Phase 1 Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

  <!-- ROW 1 : 4 BOXES -->
  <div class="grid grid-4">
    <div class="card nifty" id="box-nifty"></div>
    <div class="card volatility" id="box-volatility"></div>
    <div class="card vwap" id="box-vwap"></div>
    <div class="card anchors" id="box-pdh"></div>
  </div>

  <!-- ROW 2 : 3 BOXES -->
  <div class="grid grid-3">
    <div class="card open" id="box-open"></div>
    <div class="card trend" id="box-trend"></div>
    <div class="card institutional" id="box-flows"></div>
  </div>

  <!-- PHASE 1 END SEPARATOR -->
  <div class="phase-divider">
    <span>Phase 1 ends here</span>
  </div>

  <!-- PHASE 1.5 STARTS (EMPTY FOR NOW) -->
  <!-- Future boxes will go here -->

</div>

<script src="app.js"></script>
</body>
</html>

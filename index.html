<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market Dashboard — Phase 1</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Market Dashboard — Phase 1</h1>
  <div id="lastUpdated" class="sub">Last Updated: --</div>

  <!-- NIFTY -->
  <div class="section">
    <h2>NIFTY</h2>
    <div id="niftyValue" class="value neutral">Data Awaited</div>
  </div>

  <!-- GLOBAL INDICES -->
  <div class="section">
    <h2>Global Indices</h2>
    <ul id="globalList">
      <li class="neutral">Data Awaited</li>
    </ul>
  </div>

  <!-- VOLATILITY -->
  <div class="section">
    <h2>Volatility (ATR)</h2>
    <div id="atrValue" class="value neutral">Data Awaited</div>
  </div>

  <!-- VWAP -->
  <div class="section">
    <h2>VWAP</h2>
    <div id="vwapValue" class="value neutral">Data Awaited</div>
  </div>

  <!-- TREND ARCHITECT -->
  <div class="section">
    <h2>Trend Architect</h2>
    <div id="trendBlock" class="neutral">Data Awaited</div>
  </div>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>

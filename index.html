<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Market Dashboard – Phase 1</title>

  <!-- ✅ THIS must be a LINK tag -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <!-- Row 1 -->
    <div class="grid grid-4">
      <div class="card" id="box-nifty"></div>
      <div class="card" id="box-volatility"></div>
      <div class="card" id="box-vwap"></div>
      <div class="card" id="box-anchors"></div>

      <div class="card" id="box-trend"></div>
      <div class="card" id="box-flows"></div>

    <div class="phase-divider">Phase 1 ends here</div>

  </div>

  <!-- ✅ THIS must be a SCRIPT tag -->
  <script src="app.js"></script>
